name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm' # Add pnpm caching
    - run: pnpm install --frozen-lockfile # Replace npm ci with pnpm install
    - run: pnpm run build --if-present # Replace npm with pnpm
    - run: pnpm test # Replace npm with pnpm
